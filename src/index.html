<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Voice Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <!-- Landing screen -->
  <div id="landing">
    <div id="landing-title">
      <div>
        <h1 id="landing-name">ELVI</h1>
        <p id="landing-tagline">"Talk with me."</p>
      </div>
      <svg width="72" height="72" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="grad-logo" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="20%"  stop-color="#e8d5ff"/>
            <stop offset="50%"  stop-color="#7c6af7"/>
            <stop offset="80%"  stop-color="#2d0a6e" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#1a0050" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="16" cy="16" r="14" fill="#4a1fa8" opacity="0.18"/>
        <circle cx="16" cy="16" r="14" stroke="#a78bfa" stroke-width="0.6" stroke-dasharray="5 8" opacity="0.4"/>
        <circle cx="16" cy="16" r="11.5" stroke="#5eb8f5" stroke-width="0.5" stroke-dasharray="2 5" opacity="0.35"/>
        <circle cx="16" cy="16" r="10.5" fill="url(#grad-logo)"/>
        <circle cx="16" cy="16" r="4" fill="white" opacity="0.9"/>
        <circle cx="16" cy="2.5" r="1.3" fill="#e0b0ff">
          <animate attributeName="opacity" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="27.3" cy="22.5" r="1" fill="#5eb8f5">
          <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="4.7" cy="22.5" r="1" fill="#f59b5e">
          <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.5s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
    <p id="landing-prompt">Choose between the AIs.</p>
    <div id="bot-list">

      <div class="bot-option" data-bot="elvi">
        <img class="bot-avatar" src="./avatars/elvi.svg" alt="Elvi"/>
        <span class="bot-name">Elvi</span>
      </div>

      <div class="bot-option" data-bot="alex">
        <img class="bot-avatar" src="./avatars/alex.svg" alt="Alex"/>
        <span class="bot-name">Alex</span>
      </div>

      <div class="bot-option" data-bot="samantha">
        <img class="bot-avatar" src="./avatars/samantha.svg" alt="Samantha"/>
        <span class="bot-name">Samantha</span>
      </div>

    </div>
  </div>

  <!-- Chat screen -->
  <div id="app" style="display:none">
    <header>
      <button id="back-btn" title="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div id="header-brand">
      <div id="header-orb-wrap"></div>
      <h1 id="header-name">Elvi</h1>
      </div>
      <button id="voice-toggle" title="Toggle voice">
        <svg id="voice-on-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <svg id="voice-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/>
          <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>
    </header>

    <div id="messages"></div>

    <div id="input-area">
      <button id="mic-btn" title="Click to record"><div id="mic-dot"></div></button>
      <textarea id="user-input" placeholder="Say something..." rows="1"></textarea>
      <button id="send-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="./renderer.ts"></script>
</body>
</html>
